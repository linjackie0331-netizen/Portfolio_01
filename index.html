<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GTM Marketing Dashboard - Pro Version</title>
    <style>
        :root {
            --primary-indigo: #4B0082;
            --secondary-black: #000000;
            --accent-grey: #F5F5F5;
            --text-grey: #333333;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Helvetica, "Microsoft JhengHei", sans-serif;
            background-color: var(--accent-grey);
            color: var(--secondary-black);
            margin: 0;
            padding: 10px; /* 手機上邊距縮小 */
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: #ffffff;
            padding: 20px; /* 手機上內距縮小 */
            border-top: 6px solid var(--primary-indigo);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border-radius: 4px;
        }

        header {
            border-bottom: 2px solid var(--secondary-black);
            margin-bottom: 20px;
            padding-bottom: 10px;
            text-align: center; /* 標題置中 */
        }

        h1 { color: var(--primary-indigo); font-weight: bold; margin: 0; font-size: 1.5em; } /* 縮小標題 */
        p.subtitle { color: var(--text-grey); font-size: 0.8em; margin-top: 5px; line-height: 1.4; }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr; /* 預設手機為單欄 */
            gap: 20px;
            margin-bottom: 20px;
        }

        .control-panel, .result-panel {
            padding: 15px;
            border: 1px solid #eee;
            background-color: #fafafa;
            border-radius: 4px;
        }

        label { display: block; font-weight: bold; margin-bottom: 15px; color: var(--primary-indigo); font-size: 0.95em; }
        
        input[type=range] {
            width: 100%;
            accent-color: var(--primary-indigo);
            margin-bottom: 15px;
            height: 25px; /* 增加高度方便觸控 */
            cursor: pointer;
        }

        #budgetValue { font-weight: bold; text-align: center; margin: 0; }

        .kpi-box {
            background-color: var(--primary-indigo);
            color: white;
            padding: 20px 10px;
            text-align: center;
            border-radius: 4px;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .kpi-value { font-size: 2.5em; font-weight: bold; line-height: 1; margin-bottom: 5px; }
        .kpi-label { font-size: 0.75em; text-transform: uppercase; letter-spacing: 1px; opacity: 0.9; }

        /* 表格響應式處理 */
        .table-responsive {
            width: 100%;
            overflow-x: auto; /* 超出時可左右滑動 */
            -webkit-overflow-scrolling: touch;
            border: 1px solid #ddd;
            border-radius: 4px;
        }

        .milestone-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 500px; /* 確保表格在手機上不被過度擠壓 */
        }

        .milestone-table th {
            background-color: var(--secondary-black);
            color: white;
            padding: 12px 10px;
            text-align: left;
            font-size: 0.9em;
            white-space: nowrap; /* 標題不換行 */
        }

        .milestone-table td {
            padding: 12px 10px;
            border-bottom: 1px solid #eee;
            font-size: 0.9em;
            line-height: 1.4;
        }

        .high-cp { color: var(--primary-indigo); font-weight: bold; }

        /* 當螢幕寬度大於 768px 時（電腦版） */
        @media (min-width: 768px) {
            body { padding: 20px; }
            .container { padding: 40px; border-top-width: 8px; }
            header { text-align: left; }
            h1 { font-size: 2em; }
            p.subtitle { font-size: 0.9em; }
            .dashboard-grid { grid-template-columns: 1fr 1fr; gap: 30px; }
            .kpi-value { font-size: 3em; }
            .table-responsive { border: none; overflow-x: visible; }
            .milestone-table { border: none; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>GTM 新品上市戰情室</h1>
        <p class="subtitle">視覺規範：Indigo / Black / Light Grey | 支援 RWD 手機瀏覽</p>
    </header>

    <div class="dashboard-grid">
        <div class="control-panel">
            <label>數位廣告預算配比 (Digital Ads %)</label>
            <input type="range" id="budgetRange" min="10" max="90" value="50" oninput="updateDashboard()">
            <p id="budgetValue">目前配比: 50%</p>
            <p style="font-size: 0.8em; color: #777; margin-top: 10px; text-align: center;">* 調整滑桿以模擬預算集中對 KPI 的影響</p>
        </div>

        <div class="result-panel">
            <div class="kpi-box">
                <div class="kpi-label">預估總銷售轉換 (KPI)</div>
                <div class="kpi-value" id="kpiDisplay">1,250</div>
            </div>
        </div>
    </div>

    <div class="table-responsive">
        <table class="milestone-table">
            <thead>
                <tr>
                    <th>時程節點</th>
                    <th>重點任務</th>
                    <th>狀態</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>T-60 (設計期)</td>
                    <td>符合 Indigo 規範之視覺素材產出</td>
                    <td>進行中</td>
                </tr>
                <tr>
                    <td>T-30 (預熱期)</td>
                    <td class="high-cp">高 CP 值 KOL 合作啟動</td>
                    <td>待執行</td>
                </tr>
                <tr>
                    <td>T-Day (10/01)</td>
                    <td>新品大貨正式抵達與上市</td>
                    <td>鎖定</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    function updateDashboard() {
        const budgetRange = document.getElementById('budgetRange');
        const budget = budgetRange.value;
        document.getElementById('budgetValue').innerText = `目前配比: ${budget}%`;
        
        // 模擬一個簡單的線性 KPI 增長公式
        const kpi = Math.round(budget * 25); 
        document.getElementById('kpiDisplay').innerText = kpi.toLocaleString();
    }
    // 頁面載入時先執行一次初始化
    updateDashboard();
</script>

</body>
</html>
